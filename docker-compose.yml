version: '3.8'

services:
  backend:
    build: ./backend
    container_name: backend
    expose:
      - "8080"

  nginx:
    image: nginx:1.29
    container_name: nginx
    ports:
      - "8080:80"
    volumes:
    - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
