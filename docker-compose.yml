version: '3.8'

services:
  backend:
    build: ./backend
    container_name: backend
    expose:
      - "8080"
    healthcheck:        #Проверка работоспособности контейнера
    test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080"] #используем wget для проверки доступности приложения внутри контейнера так как на python 3.11 по умолчанию не установлен curl
    interval: 10s
    timeout: 5s
    retries: 3

  nginx:
    image: nginx:1.29
    container_name: nginx
    ports:
      - "8080:80"
    volumes:
    - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - backend
